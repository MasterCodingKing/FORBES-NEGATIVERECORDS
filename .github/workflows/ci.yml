name: CI

on:
  push:
    branches: [main, BRANCH-NEW]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────
  # Job 1 – Backend (Node.js + Prisma)
  # ────────────────────────────────────────
  backend:
    name: Backend — Install & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check for syntax errors
        run: node --check src/app.js

  # ────────────────────────────────────────
  # Job 2 – Frontend (React + Vite)
  # ────────────────────────────────────────
  frontend:
    name: Frontend — Install, Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

  # ────────────────────────────────────────
  # Job 3 – OCR Microservice (Python)
  # ────────────────────────────────────────
  ocr-service:
    name: OCR Service — Lint (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ocr-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only — don't fail the build for style issues
          flake8 . --count --exit-zero --max-line-length=120 --statistics
