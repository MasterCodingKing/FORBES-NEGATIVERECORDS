version: "3.8"

services:
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: forbes-ocr-service
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - OCR_LANGUAGES=en
      - MAX_UPLOAD_SIZE_MB=200
      - USE_GPU=false
    volumes:
      - ./ocr-service:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
